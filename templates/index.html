<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>InsightAgent</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a, #1e3a8a);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 600px;
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0px 10px 30px rgba(0,0,0,.3);
            text-align: center;
        }

        h1 {
            color: #2563eb;
            margin-bottom: 15px;
        }

        p {
            color: #555;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        input {
            width: 100%;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 16px;
            margin-bottom: 20px;
        }

        input:focus {
            outline: none;
            border-color: #2563eb;
        }

        button {
            width: 100%;
            padding: 15px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            transition: .3s;
        }

        button:hover {
            background: #1d4ed8;
        }

        .footer {
            margin-top: 25px;
            color: gray;
            font-size: 14px;
        }

        .loading {
            display: none;
            margin-top: 20px;
            color: #2563eb;
            font-weight: bold;
        }
    </style>

</head>

<body>

<div class="container">

    <h1>🚀 InsightAgent</h1>

    <p>
        Enter any supported website URL and let AI scrape data,
        analyze it, generate charts, and create a business report automatically.
    </p>

    <form action="/analyze" method="POST" onsubmit="showLoading()">

        <input
            type="text"
            name="url"
            placeholder="https://books.toscrape.com/"
            required
        >

        <button type="submit">
            🔍 Analyze Website
        </button>

    </form>

    <div id="loading" class="loading">
        ⏳ AI is analyzing the website... Please wait.
    </div>

    <div class="footer">
        Built with ❤️ using Flask • LangGraph • Gemini • Python
    </div>

</div>

<script>
function showLoading() {
    document.getElementById("loading").style.display = "block";
}
</script>

</body>

</html>
