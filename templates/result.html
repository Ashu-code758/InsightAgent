<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InsightAgent Report</title>

    <style>
        body {
            margin: 0;
            padding: 30px;
            background: #f4f6f9;
            font-family: Arial, Helvetica, sans-serif;
        }

        .container {
            max-width: 1200px;
            margin: auto;
        }

        h1 {
            text-align: center;
            color: #2c3e50;
        }

        .buttons {
            text-align: center;
            margin: 20px 0;
        }

        button {
            background: #007bff;
            color: white;
            border: none;
            padding: 12px 20px;
            margin: 10px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #0056b3;
        }

        .report {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0,0,0,.15);
            white-space: pre-wrap;
            line-height: 1.6;
        }

        .charts {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .chart {
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0,0,0,.15);
            flex: 1;
            min-width: 450px;
            text-align: center;
        }

        .chart img {
            width: 100%;
            border-radius: 8px;
        }

        .back {
            text-align: center;
            margin-top: 30px;
        }

        a {
            text-decoration: none;
        }
    </style>

</head>

<body>

<div class="container">

    <h1>📊 InsightAgent Business Report</h1>

    <div class="buttons">

        <a href="/download/csv">
            <button>⬇ Download CSV</button>
        </a>

        <a href="/download/pdf">
            <button>📄 Download PDF</button>
        </a>

    </div>

    <div class="report">
        {{ analysis }}
    </div>

    <h2 style="text-align:center;margin-top:40px;">
        📈 Generated Charts
    </h2>

    <div class="charts">

        <div class="chart">
            <h3>Availability Chart</h3>
            <img src="/charts/availability_bar.png" alt="Availability Chart">
        </div>

        <div class="chart">
            <h3>Price Distribution</h3>
            <img src="/charts/price_distribution.png" alt="Price Distribution">
        </div>

    </div>

    <div class="back">

        <a href="/">
            <button>🏠 Analyze Another Website</button>
        </a>

    </div>

</div>

</body>

</html>
